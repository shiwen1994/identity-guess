<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素快跑 Pixel Dash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: "Courier New", monospace;
  overflow: hidden;
}
canvas {
  border: 3px solid #f0d080;
  display: block;
  image-rendering: pixelated;
  max-width: 100vw;
  max-height: 80vh;
}
#hud {
  color: #f0d080;
  font-size: 18px;
  margin-bottom: 8px;
  letter-spacing: 2px;
  text-align: center;
}
#instructions {
  color: #888;
  font-size: 13px;
  margin-top: 10px;
  text-align: center;
}
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 10;
}
#overlay h2 { color: #f0d080; font-size: 32px; margin-bottom: 20px; letter-spacing: 4px; }
#overlay button {
  padding: 14px 48px; font-size: 18px; font-weight: bold;
  background: linear-gradient(135deg, #f0d080, #e8a830);
  color: #1a1a2e; border: none; border-radius: 30px; cursor: pointer;
  letter-spacing: 2px;
}
#overlay button:hover { transform: scale(1.05); }
#overlay p { color: #888; margin-bottom: 30px; font-size: 14px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div id="hud">
  <span id="score">金币: 0</span> &nbsp;|&nbsp; <span id="best">最高: 0</span> &nbsp;|&nbsp; <span id="lives">❤❤❤</span>
</div>
<canvas id="game" width="800" height="400"></canvas>
<div id="overlay">
  <h2>像素快跑</h2>
  <p>按空格键或点击屏幕跳跃<br>踩死敌人 / 收集金币 / 跳过沟壑</p>
  <button onclick="startGame()">开始游戏</button>
</div>
<div id="instructions">空格键 / 点击屏幕 跳跃</div>

<script>
// ── Canvas Setup ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ── Pixel Art Sprites (drawn via canvas) ──
const COLORS = {
  sky: '#5BA8D0',
  ground: '#8B5E3C',
  groundDark: '#6B4423',
  brick: '#C84C0C',
  brickDark: '#A03C08',
  brickLight: '#E86820',
  coin: '#FFD700',
  coinDark: '#DAA520',
  pipe: '#30C830',
  pipeDark: '#20A020',
  pipeLight: '#50E850',
  mario: '#E52521',
  marioDark: '#B01C1A',
  marioSkin: '#FCA044',
  marioHat: '#3C8BC4',
  goomba: '#C84C0C',
  goombaDark: '#8B3008',
  flag: '#FFFFFF',
  flagPole: '#888',
};

// Draw helpers
function rect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// ── Mario (16x16) ──
function drawMario(x, y, frame) {
  const xb = Math.floor(x), yb = Math.floor(y);
  // hat
  rect(xb+2,yb, 12,4, COLORS.marioHat);
  rect(xb+1,yb+3, 14,3, COLORS.marioHat);
  // face
  rect(xb+3,yb+6, 10,5, COLORS.marioSkin);
  rect(xb+10,yb+7, 3,3, COLORS.marioSkin); // nose
  // eyes
  rect(xb+4,yb+7, 2,2, '#222');
  rect(xb+9,yb+7, 2,2, '#222');
  // body
  rect(xb+2,yb+11, 12,4, COLORS.mario);
  rect(xb+4,yb+14, 8,2, COLORS.mario);
  // overalls
  rect(xb+4,yb+15, 3,2, COLORS.marioDark);
  rect(xb+9,yb+15, 3,2, COLORS.marioDark);
  // shoes
  rect(xb+2,yb+16, 5,2, COLORS.brickDark);
  rect(xb+9,yb+16, 5,2, COLORS.brickDark);
}

// ── Goomba (16x16) ──
function drawGoomba(x, y) {
  const xb = Math.floor(x), yb = Math.floor(y);
  rect(xb+2,yb,8,6, COLORS.goomba);
  rect(xb,yb+4,12,6, COLORS.goomba);
  rect(xb+4,yb+1,8,3, COLORS.goombaDark);
  // eyes
  rect(xb+2,yb+3,4,4,'#fff');
  rect(xb+10,yb+3,4,4,'#fff');
  rect(xb+3,yb+4,2,2,'#000');
  rect(xb+11,yb+4,2,2,'#000');
  // mouth
  rect(xb+4,yb+7,8,2, COLORS.goombaDark);
  // feet
  rect(xb-1,yb+10,5,3, COLORS.goomba);
  rect(xb+12,yb+10,5,3, COLORS.goomba);
}

// ── Coin (8x8) ──
function drawCoin(x, y, frame) {
  const xb = Math.floor(x), yb = Math.floor(y);
  const shimmer = frame % 20 < 10;
  if (shimmer) {
    rect(xb+2,yb,4,8,COLORS.coin);
    rect(xb+1,yb+1,2,6,COLORS.coinDark);
    rect(xb+5,yb+1,2,6,COLORS.coinDark);
  } else {
    rect(xb,yb+2,8,4,COLORS.coin);
    rect(xb+1,yb,6,2,COLORS.coinDark);
    rect(xb+1,yb+6,6,2,COLORS.coinDark);
  }
}

// ── Brick (32x16) ──
function drawBrick(x, y) {
  rect(x,y,32,16,COLORS.brick);
  rect(x,y,32,2,COLORS.brickLight);
  rect(x,y+14,32,2,COLORS.brickDark);
  rect(x,y+7,32,2,COLORS.brickDark);
  rect(x+15,y,2,7,COLORS.brickDark);
  rect(x+31,y+8,1,8,COLORS.brickDark);
}

// ── Platform (variable width, 16px tall) ──
function drawPlatform(x, y, width) {
  const blocks = Math.ceil(width / 32);
  for (let i = 0; i < blocks; i++) {
    drawBrick(x + i*32, y);
  }
}

// ── Ground ──
function drawGround(x, y, width) {
  rect(x,y,width,16,COLORS.ground);
  rect(x,y,width,3,COLORS.groundDark);
  for (let i=0; i<width; i+=8) {
    rect(x+i,y,1,16,COLORS.groundDark);
  }
}

// ── Coin Brick (? block) ──
function drawCoinBlock(x, y, frame) {
  rect(x,y,32,32,'#DAA520');
  rect(x+1,y+1,30,30,'#FFD700');
  rect(x+2,y+2,28,28,'#FFFACD');
  rect(x,y,32,3,'#DAA520');
  rect(x,y+29,32,3,'#DAA520');
  // Question mark
  ctx.fillStyle = '#8B4513';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('?', x+10, y+24);
}

// ── Flag ──
function drawFlag(x, y) {
  rect(x,y,6,H-y,'#888');
  for (let fy=y; fy<H-10; fy+=20) {
    rect(x+6,fy,25,12,'#fff');
  }
}

// ── Game State ──
let score = 0, best = 0, lives = 3;
let gameOver = false;
let animFrame = 0;

const GRAVITY = 0.6;
const JUMP_FORCE = -13;
const GROUND_Y = H - 40;

// Mario state
let mario = { x:100, y:GROUND_Y-16, vx:0, vy:0, onGround:false };

// Level elements
let platforms = []; // {x, y, w}
let gaps = []; // {x, w}
let coins = []; // {x, y, collected, baseY}
let enemies = []; // {x, y, vx, alive}
let flagX = 0;

function genLevel() {
  platforms = [];
  gaps = [];
  coins = [];
  enemies = [];

  // Starting safe platform
  platforms.push({x:0, y:GROUND_Y, w:300});

  let cx = 300;
  let maxX = 5000;

  while (cx < maxX) {
    // Random gap
    const gapW = 40 + Math.random() * 80;
    gaps.push({x:cx, w:gapW});
    cx += gapW;

    // Platform after gap
    const platW = 100 + Math.random() * 200;
    const platY = GROUND_Y - (Math.random() < 0.3 ? 40 : 0);
    platforms.push({x:cx+gapW, y:platY, w:platW});

    // Coins
    if (Math.random() < 0.7) {
      const coinCount = 1 + Math.floor(Math.random() * 3);
      for (let i=0; i<coinCount; i++) {
        coins.push({
          x: cx+gapW + 20 + i*25,
          y: platY - 40,
          collected: false,
          baseY: platY - 40
        });
      }
    }

    // Enemies on platform
    if (Math.random() < 0.4 && platW > 80) {
      enemies.push({
        x: cx+gapW + platW/2,
        y: platY - 16,
        vx: -1,
        alive: true
      });
    }

    cx += gapW + platW;
  }

  flagX = cx + 200;
  platforms.push({x:flagX, y:GROUND_Y, w:200});
}

// Camera
let camX = 0;
let marioWorldX = 100;

// Input
let jumpPressed = false;
let touchStart = null;

function jump() {
  if (mario.onGround) {
    mario.vy = JUMP_FORCE;
    mario.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    jump();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') jumpPressed = false;
});

canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });
canvas.addEventListener('mousedown', e => { e.preventDefault(); jump(); });

function startGame() {
  score = 0; lives = 3; gameOver = false;
  mario = {x:100, y:GROUND_Y-16, vx:0, vy:0, onGround:false};
  camX = 0; marioWorldX = 100;
  genLevel();
  document.getElementById('overlay').classList.add('hidden');
  loop();
}

function loseLife() {
  lives--;
  if (lives <= 0) {
    gameOver = true;
    if (score > best) best = score;
    document.getElementById('overlay').querySelector('h2').textContent = '游戏结束';
    document.getElementById('overlay').querySelector('p').innerHTML =
      `金币: ${score} | 最高: ${best}<br>再来一局？`;
    document.getElementById('overlay').classList.remove('hidden');
  } else {
    // Reset position
    mario.x = 100; mario.y = GROUND_Y-16;
    mario.vy = 0; mario.onGround = false;
    marioWorldX = 100; camX = 0;
  }
}

function update() {
  if (gameOver) return;

  animFrame++;

  // Auto-run
  marioWorldX += 3;
  mario.x = marioWorldX - camX;

  // Gravity
  mario.vy += GRAVITY;
  mario.y += mario.vy;

  // Platform collision
  mario.onGround = false;
  for (let p of platforms) {
    if (marioWorldX + 8 > p.x && marioWorldX < p.x + p.w) {
      if (mario.y + 18 >= p.y && mario.y + 18 <= p.y + 16 && mario.vy >= 0) {
        mario.y = p.y - 18;
        mario.vy = 0;
        mario.onGround = true;
      }
    }
  }

  // Fall in gap
  if (mario.y > H + 50) {
    loseLife();
    return;
  }

  // Head collision with top of screen
  if (mario.y < 0) { mario.y = 0; mario.vy = 0; }

  // Camera follow
  camX = marioWorldX - 150;

  // Coins
  for (let c of coins) {
    if (c.collected) continue;
    const dx = marioWorldX - c.x;
    const dy = mario.y - c.y;
    if (Math.abs(dx) < 16 && Math.abs(dy) < 16) {
      c.collected = true;
      score += 10;
    }
    // Floating animation
    c.y = c.baseY + Math.sin(animFrame * 0.1) * 3;
  }

  // Enemies
  for (let e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;

    // Check platform edge
    let onPlat = false;
    for (let p of platforms) {
      if (e.x + 8 > p.x && e.x < p.x + p.w && Math.abs(e.y + 16 - p.y) < 4) {
        onPlat = true;
        if (e.x <= p.x || e.x + 16 >= p.x + p.w) e.vx *= -1;
      }
    }
    if (!onPlat) e.vx *= -1;

    // Mario stomps enemy
    if (mario.vy > 0 && Math.abs(marioWorldX - e.x) < 14 && Math.abs(mario.y + 18 - e.y) < 10) {
      e.alive = false;
      mario.vy = -8;
      score += 50;
    }

    // Mario hits enemy from side
    if (Math.abs(marioWorldX - e.x) < 14 && Math.abs(mario.y - e.y) < 14) {
      loseLife();
      return;
    }
  }

  // Reached flag = WIN
  if (marioWorldX >= flagX) {
    score += 200;
    gameOver = true;
    if (score > best) best = score;
    document.getElementById('overlay').querySelector('h2').textContent = '🎉 通关！';
    document.getElementById('overlay').querySelector('p').innerHTML =
      `金币: ${score} | 最高: ${best}<br>恭喜通关！再来一局？`;
    document.getElementById('overlay').classList.remove('hidden');
  }

  // Off screen left = dead
  if (marioWorldX < camX - 50) {
    loseLife();
    return;
  }

  // Update HUD
  document.getElementById('score').textContent = '金币: ' + score;
  document.getElementById('best').textContent = '最高: ' + best;
  document.getElementById('lives').textContent = '❤'.repeat(lives);
}

function draw() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#3A7BD5');
  grad.addColorStop(1,'#5BA8D0');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Clouds (parallax)
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const cloudBase = Math.floor(camX * 0.2);
  for (let i=0; i<5; i++) {
    const cx2 = ((i * 300 - cloudBase) % (W+200)) - 100;
    ctx.beginPath();
    ctx.arc(cx2, 60+i*10, 25+i*5, 0, Math.PI*2);
    ctx.arc(cx2+20, 55+i*10, 20+i*3, 0, Math.PI*2);
    ctx.fill();
  }

  // Hills (parallax)
  ctx.fillStyle = '#2D7D46';
  const hillBase = Math.floor(camX * 0.4);
  for (let i=0; i<6; i++) {
    const hx = ((i * 250 - hillBase) % (W+300)) - 150;
    ctx.beginPath();
    ctx.moveTo(hx, H-40);
    ctx.quadraticCurveTo(hx+75, H-120, hx+150, H-40);
    ctx.fill();
  }

  // Platforms
  for (let p of platforms) {
    const sx = p.x - camX;
    if (sx > W+50 || sx+p.w < -50) continue;
    if (p.y < GROUND_Y) {
      drawPlatform(sx, p.y, p.w);
    } else {
      drawGround(sx, p.y, p.w);
    }
  }

  // Gaps (just dark)
  for (let g of gaps) {
    const sx = g.x - camX;
    if (sx > W+50 || sx+g.w < -50) continue;
    // draw pit darkness
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(sx, GROUND_Y, g.w, 40);
  }

  // Coins
  for (let c of coins) {
    if (c.collected) continue;
    const sx = c.x - camX;
    if (sx < -20 || sx > W+20) continue;
    drawCoin(sx, c.y, animFrame);
  }

  // Enemies
  for (let e of enemies) {
    if (!e.alive) continue;
    const sx = e.x - camX;
    if (sx < -20 || sx > W+20) continue;
    drawGoomba(sx, e.y);
  }

  // Flag
  const fx = flagX - camX;
  if (fx > -20 && fx < W+20) {
    drawFlag(fx, GROUND_Y - 200);
    // Flag on top
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('🏁', fx-4, GROUND_Y-195);
  }

  // Mario
  drawMario(mario.x, mario.y, animFrame);

  // Scanlines (retro effect)
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  for (let y=0; y<H; y+=4) {
    ctx.fillRect(0, y, W, 2);
  }
}

function loop() {
  update();
  draw();
  if (!gameOver) requestAnimationFrame(loop);
}

// Init draw
genLevel();
draw();
</script>
</body>
</html>
