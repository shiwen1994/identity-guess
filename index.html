<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜人游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #0f0f1a; color: #e8e0d0; min-height: 100vh; }
header { text-align: center; padding: 40px 20px 20px; background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%); }
header h1 { font-size: 24px; font-weight: 400; color: #f0d080; letter-spacing: 4px; }
header p { font-size: 12px; color: #666; margin-top: 6px; }
#game { width: 100%; max-width: 520px; padding: 0 20px 60px; }
#startScreen { text-align: center; padding-top: 60px; }
#startScreen p { font-size: 14px; color: #888; line-height: 2; margin: 20px 0 40px; }
#startBtn { padding: 14px 48px; font-size: 16px; font-weight: 600; background: linear-gradient(135deg, #f0d080, #e8a830); color: #1a1a2e; border: none; border-radius: 30px; cursor: pointer; letter-spacing: 2px; }
#startBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(240,208,128,0.3); }
#gameArea { display: none; }
#gameArea.show { display: block; }
.clue-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px 24px; margin-bottom: 16px; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.clue-num { font-size: 11px; color: #666; margin-bottom: 8px; }
.clue-text { font-size: 17px; line-height: 1.8; color: #e0d8c8; white-space: pre-wrap; }
#history { margin-bottom: 16px; }
.hist-item { padding: 10px 16px; border-radius: 12px; margin-bottom: 6px; font-size: 14px; animation: fadeIn 0.3s ease; white-space: pre-wrap; }
.hist-item.right { background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3); color: #6fbf8f; }
.hist-item.wrong { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: #e07070; }
.hist-item.hint { background: rgba(240,208,128,0.08); border: 1px solid rgba(240,208,128,0.2); color: #c8a850; }
#inputRow { display: flex; gap: 10px; margin-bottom: 12px; }
#guessInput { flex: 1; padding: 12px 16px; background: rgba(255,255,255,0.07); border: 1px solid rgba(240,208,128,0.2); border-radius: 24px; color: #e8e0d0; font-size: 15px; font-family: inherit; outline: none; }
#guessInput:focus { border-color: rgba(240,208,128,0.5); }
#guessInput::placeholder { color: #555; }
#sendBtn { padding: 12px 20px; background: linear-gradient(135deg, #f0d080, #e8a830); color: #1a1a2e; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
#moreClueBtn { width: 100%; padding: 12px; background: transparent; border: 1px solid rgba(240,208,128,0.2); border-radius: 24px; color: #888; font-size: 14px; cursor: pointer; margin-bottom: 16px; }
#moreClueBtn:hover { border-color: rgba(240,208,128,0.4); color: #c8a850; }
#resultBox { display: none; text-align: center; padding: 30px; background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); border-radius: 16px; margin-top: 20px; }
#resultBox.show { display: block; animation: fadeIn 0.5s ease; }
#resultName { font-size: 24px; color: #f0d080; margin-bottom: 8px; }
#resultIntro { font-size: 14px; color: #888; margin-bottom: 8px; }
#resultRating { font-size: 16px; color: #6fbf8f; margin-bottom: 20px; }
#restartBtn { padding: 12px 32px; background: linear-gradient(135deg, #f0d080, #e8a830); color: #1a1a2e; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>猜 人 游 戏</h1>
  <p>75位名人 · 你来猜</p>
</header>
<div id="game">
  <div id="startScreen">
    <p>随机选择了一位历史人物或名人<br>通过提问或直接猜人名来揭开答案<br>可以问"是/否"类问题，也可以直接猜</p>
    <button id="startBtn" onclick="startGame()">开始挑战</button>
  </div>
  <div id="gameArea">
    <div class="clue-box">
      <div class="clue-num">线索 <span id="clueNum">1</span></div>
      <div class="clue-text" id="clueText"></div>
    </div>
    <div id="history"></div>
    <button id="moreClueBtn" onclick="moreClue()">要更多线索（+1轮）</button>
    <div id="inputRow">
      <input id="guessInput" type="text" placeholder="输入猜测或问题…" onkeydown="if(event.key==='Enter')sendGuess()" autocomplete="off">
      <button id="sendBtn" onclick="sendGuess()">发送</button>
    </div>
  </div>
  <div id="resultBox">
    <div id="resultName"></div>
    <div id="resultIntro"></div>
    <div id="resultRating"></div>
    <button id="restartBtn" onclick="startGame()">再来一局</button>
  </div>
</div>

function getRating(r) {
  if (r === 1) return "SSS 天才直觉";
  if (r === 2) return "SS 学识渊博";
  if (r === 3) return "S 聪明绝顶";
  if (r <= 5) return "A 见多识广";
  if (r <= 7) return "B 推理达人";
  if (r <= 10) return "C 险中求胜";
  return "D 再接再厉";
}

function fuzzyMatch(input, target) {
  input = input.trim().toLowerCase().replace(/[^a-zA-Z\u4e00-\u9fa5]/g,"");
  target = target.toLowerCase();
  if (input === target) return true;
  var aliases = {
    "诸葛亮":["诸葛","孔明","卧龙"],
    "刘邦":["刘季","汉高祖","汉高帝"],
    "项羽":["项籍","西楚霸王"],
    "曹操":["阿瞒","孟德"],
    "关羽":["关公","云长","关帝"],
    "张飞":["翼德"],
    "周瑜":["公瑾"],
    "刘备":["玄德"],
    "孔子":["孔丘","仲尼"],
    "孟子":["孟轲"],
    "老子":["李耳","太上老君"],
    "屈原":["正则","灵均"],
    "王羲之":["逸少"],
    "岳飞":["鹏举"],
    "韩信":["兵仙","神帅"],
    "张良":["子房"],
    "扁鹊":["秦越人"],
    "华佗":["元化"],
    "李时珍":["濒湖","东壁"],
    "张仲景":["医圣","南阳"],
    "武则天":["武媚娘","则天"],
    "成吉思汗":["铁木真"],
    "孙中山":["中山","孙文","国父"]
  };
  var als = aliases[target];
  if (als) {
    for (var i = 0; i < als.length; i++) {
      if (input.indexOf(als[i]) !== -1 || als[i].indexOf(input) !== -1) return true;
    }
  }
  if (target.indexOf(input) !== -1 || input.indexOf(target) !== -1) return true;
  return false;
}

function startGame() {
  person = PEOPLE[Math.floor(Math.random() * PEOPLE.length)];
  clueIndex = 0;
  rounds = 0;
  correct = false;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameArea').classList.add('show');
  document.getElementById('resultBox').classList.remove('show');
  document.getElementById('history').innerHTML = '';
  document.getElementById('clueNum').textContent = '1';
  document.getElementById('clueText').textContent = person.clues[0];
  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').focus();
}

function moreClue() {
  if (clueIndex < person.clues.length - 1) {
    clueIndex++;
    rounds++;
    document.getElementById('clueNum').textContent = String(clueIndex + 1);
    document.getElementById('clueText').textContent = person.clues[clueIndex];
    addHist('hint', '第' + (clueIndex+1) + '条线索：' + person.clues[clueIndex]);
  } else {
    addHist('hint', '已是最后一条线索！');
  }
}

function addHist(type, text) {
  var el = document.createElement('div');
  el.className = 'hist-item ' + type;
  el.textContent = text;
  var container = document.getElementById('history');
  container.insertBefore(el, container.firstChild);
}

function sendGuess() {
  var input = document.getElementById('guessInput').value.trim();
  if (!input || correct) return;
  document.getElementById('guessInput').value = '';

  if (fuzzyMatch(input, person.name)) {
    correct = true;
    rounds++;
    addHist('right', '正确！' + input);
    showResult();
    return;
  }

  var isYesNo = input.indexOf('是') !== -1 || input.indexOf('否') !== -1 || input.indexOf('吗') !== -1 || input.indexOf('?') !== -1;
  rounds++;
  var responses = ['方向有误，再想想', '不完全是，继续猜', '不是，继续努力', '不对，再换角度'];
  var resp = responses[Math.floor(Math.random() * responses.length)];
  addHist('wrong', input + '\n' + resp);

  if (clueIndex < person.clues.length - 1 && rounds >= 5) {
    moreClue();
  }
}

function showResult() {
  document.getElementById('gameArea').classList.remove('show');
  var box = document.getElementById('resultBox');
  box.classList.add('show');
  document.getElementById('resultName').textContent = '答案：' + person.name;
  document.getElementById('resultIntro').textContent = person.intro;
  document.getElementById('resultRating').textContent = '用了 ' + rounds + ' 轮 | ' + getRating(rounds);
}
</script>
</body>
</html>
